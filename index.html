<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 Segera Hadir - My Awesome SaaS</title>
  <!-- Font tulisan tangan dari Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #fdfcfb, #e2d1c3);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Caveat', cursive; /* Font tulisan tangan */
      padding: 1.5rem;
    }

    .card {
      background: white;
      max-width: 500px;
      width: 100%;
      border-radius: 1.5rem;
      padding: 3rem 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .emoji-icon {
      font-size: 3.5rem;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 3.2rem;
      font-weight: 700;
      color: #2d2d2d;
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }

    .tagline {
      font-size: 1.8rem;
      color: #555;
      margin-bottom: 2rem;
      font-weight: 400;
    }

    .description {
      font-size: 1.3rem;
      color: #4a4a4a;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .notify-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .email-input {
      padding: 0.9rem 1.2rem;
      font-size: 1.3rem;
      font-family: 'Caveat', cursive; /* font tulisan tangan di input */
      border: 2px dashed #bbb;
      border-radius: 3rem;
      outline: none;
      text-align: center;
      transition: border 0.3s;
      background: #fefefe;
    }

    .email-input:focus {
      border-color: #e07a5f;
    }

    .btn {
      background: #e07a5f;
      border: none;
      color: white;
      font-size: 1.8rem;
      font-family: 'Caveat', cursive; /* font tulisan tangan di tombol */
      font-weight: 700;
      padding: 0.8rem;
      border-radius: 3rem;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      box-shadow: 0 6px 12px rgba(224, 122, 95, 0.3);
    }

    .btn:hover {
      background: #c96a4f;
      transform: translateY(-2px);
    }

    .footer-note {
      margin-top: 2rem;
      font-size: 1.1rem;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji-icon">✍️</div>
    <h1>My Awesome SaaS</h1>
    <p class="tagline">Tulis ide, wujudkan karya.</p>
    <p class="description">
      Kami sedang menyiapkan sesuatu yang istimewa untukmu.
      Bergabunglah sebagai pendengar pertama dan dapatkan akses awal.
    </p>
    <form class="notify-form" onsubmit="alert('🎉 Kamu sudah terdaftar! Nantikan kabar dari kami.'); return false;">
      <input type="email" class="email-input" placeholder="Masukkan email kamu..." required>
      <button type="submit" class="btn">🔥 Beri Tahu Saya</button>
    </form>
    <p class="footer-note">Segera hadir di Product Hunt 🚀</p>
  </div>
</body>
</html>
